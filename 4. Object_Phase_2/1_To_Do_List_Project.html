<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>

<body>
    <script>
        let todos = [];

        function addTodo(task) {
            todos.push({ id: todos.length + 1, task, done: false }); // task is shorhand for ->  task : task
        }

        function completeTodo(id) {
            let todo = todos.find(t => t.id === id);
            if (todo) todo.done = true;
        }

        function removeTodo(id) {
            todos = todos.filter(t => t.id !== id);
        }

        function showTodos() {
            todos.forEach(t => {
                console.log(`${t.id} [${t.done ? "Finish" : " "}] ${t.task}`);
            });
        }

        addTodo("Learn JS");
        addTodo("Build a project");
        addTodo("Sleep");
        completeTodo(1);
        showTodos();
    
        // 1. [x] Learn JS
        // 2. [ ] Build a project
        // 3. [ ] Sleep


      
    </script>
</body>

</html>
