        // Check whether this property exists: "user.address.city" ( use : split(".") )

        let object = {
            user: {
                address: {
                    city: "Ahmedabad"
                }
            }
        }

        function hasProperty(object, path) {
            let keys = path.split(".");

            let current = object;

            for (let key of keys) {
                if (!(key in current)) {
                    return false;
                }

                current = current[key];
            }

            return true;
        }

        // Check if two objects have same keys and values.

        let obj1 = { a: 1, b: 2 };
        let obj2 = { a: 1, b: 2 };

        console.log(JSON.stringify(obj1) === JSON.stringify(obj2));


        // method - 2
        function isEqual(obj1, obj2) {

            let keys1 = Object.keys(obj1);
            let keys2 = Object.keys(obj2);

            if (keys1.length !== keys2.length) {
                return false;
            }

            for (let key of keys1) {

                if (!(key in obj2)) {
                    return false;
                }

                if (obj1[key] !== obj2[key]) {
                    return false;
                }
            }

            return true;
        }

        console.log(isEqual({ a: 1, b: 2 }, { a: 1, b: 2 }));
