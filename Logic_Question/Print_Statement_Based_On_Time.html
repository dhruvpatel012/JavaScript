<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        let hour = new Date().getHours(); //"Get the current time from the computer and extract only the hour."

        if (hour < 12) {
            console.log("Good Morning");
        } else if (hour < 18) {
            console.log("Good Afternoon");
        } else {
            console.log("Good Evening");
        }
    </script>
</body>

</html>
